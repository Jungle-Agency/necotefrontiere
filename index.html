    <!-- Données structurées : activité locale -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Né côté frontière (NCF)",
      "description": "Service d'accompagnement des travailleurs frontaliers France-Suisse : optimisation de CV aux normes helvétiques, recherche d'emploi à Genève et en Suisse romande, installation frontalière (assurance LAMal/CMU, fiscalité, banque).",

      "email": "contact@ncf-accompagnement.fr",
      "telephone": "+33685813683",
      "sameAs": [
        "https://www.facebook.com/share/1Eki7MXbde/",
        "https://www.tiktok.com/@ncfconseil"
      ],
      "image": "https://www.ncf-accompagnement.fr/logo-ncf-256.png",
      "priceRange": "119€ - 400€",
      "areaServed": [
        { "@type": "AdministrativeArea", "name": "Genève" },
        { "@type": "AdministrativeArea", "name": "Canton de Vaud" },
        { "@type": "AdministrativeArea", "name": "Haute-Savoie" },

      ],
      "knowsLanguage": "fr"
    }

    <!-- Données structurées : FAQ (rich snippets Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Quelle est la différence fiscale entre travailler à Genève et en Haute-Savoie ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "À Genève, l'impôt sur le revenu est prélevé directement à la source sur votre salaire suisse. En Haute-Savoie (si vous êtes résident et travaillez dans d'autres cantons comme Vaud), vous payez vos impôts en France. NCF vous aide à décrypter les accords fiscaux pour simuler précisément votre revenu net disponible après impôts et cotisations."
          }
        },
        {
          "@type": "Question",
          "name": "Comment choisir entre l'assurance suisse LAMal et la CMU française ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En tant que travailleur frontalier, vous disposez d'un « droit d'option » unique pour choisir votre couverture maladie entre le système suisse (LAMal frontalier) et le système de sécurité sociale français (CMU). Ce choix est définitif et irrévocable. Nous analysons votre structure familiale, vos revenus et vos besoins médicaux pour calculer la solution la plus avantageuse pour vous."
          }
        },
        {
          "@type": "Question",
          "name": "Pourquoi un CV français n'est-il généralement pas accepté en Suisse ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le marché du travail suisse a des codes stricts. Les recruteurs s'attendent à voir des mentions spécifiques : votre permis de travail actuel ou ciblé (G pour frontalier, B pour résident), votre nationalité, une photo extrêmement professionnelle, et un niveau de détail précis sur vos tâches et vos réalisations chiffrées."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce que le statut de quasi-résident à Genève ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Si au moins 90 % des revenus de votre foyer proviennent de Suisse, vous pouvez demander à être traité fiscalement comme un résident suisse (quasi-résident). Cela vous ouvre le droit de déduire vos charges réelles (loyer, frais de transport, pensions, cotisations au 3ème pilier)."
          }
        },
        {
          "@type": "Question",
          "name": "Comment gérer mon salaire en Francs Suisses (CHF) pour éviter les frais de change ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Recevoir un salaire en CHF et vivre en France (Zone Euro) implique un risque de change et des frais bancaires. Nous vous accompagnons pour ouvrir les bons comptes (virement international à frais minimes, compte multi-devises) afin de rapatrier votre salaire au meilleur taux du marché."
          }
        },
        {
          "@type": "Question",
          "name": "Combien de temps faut-il pour obtenir un permis de travail frontalier (Permis G) ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "C'est l'employeur suisse qui effectue la demande de permis G auprès de l'office cantonal de la population et des migrations (OCPM à Genève). Les délais varient généralement de 2 à 4 semaines. Vous pouvez commencer à travailler dès le dépôt du dossier par votre employeur."
          }
        }
      ]
    }
    </script>
